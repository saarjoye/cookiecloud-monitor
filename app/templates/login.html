<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 CookieCloud Monitor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/login-app/login.css">
    <style>
        :root {
            color: #f5f7fb;
            background: #0b0d14;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 164, 67, 0.16), transparent 18%),
                radial-gradient(circle at 80% 15%, rgba(127, 86, 247, 0.14), transparent 22%),
                linear-gradient(180deg, #090b11 0%, #0d1119 100%);
        }

        #login-root {
            display: none;
        }

        html[data-login-app="ready"] #login-root {
            display: block;
        }

        html[data-login-app="ready"] #login-fallback {
            display: none;
        }

        .fallback-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .fallback-card {
            width: min(100%, 420px);
            padding: 28px 24px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .fallback-card h1 {
            margin: 0 0 10px;
            font-size: 34px;
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .fallback-card p {
            margin: 0 0 20px;
            color: rgba(245, 247, 252, 0.7);
            line-height: 1.8;
        }

        .fallback-card form {
            display: grid;
            gap: 14px;
        }

        .fallback-card input {
            height: 52px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            padding: 0 14px;
            color: #fff;
            font: inherit;
        }

        .fallback-card button {
            height: 52px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(90deg, #9a74ff 0%, #7f56f7 100%);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .fallback-error {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(240, 68, 97, 0.24);
            background: rgba(240, 68, 97, 0.1);
            color: #ff9cac;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="login-fallback" class="fallback-shell">
        <section class="fallback-card">
            <h1>登录监控面板</h1>
            <p>如果增强版登录页没有正常加载，你仍然可以在这里完成登录。</p>
            {% if fallback_error %}
            <div class="fallback-error">{{ fallback_error }}</div>
            {% endif %}
            <form method="post" action="/auth/login-form">
                <input type="hidden" name="next" value="{{ next_path }}">
                <input type="text" name="username" placeholder="用户名" value="{{ fallback_username or '' }}" autocomplete="username" required>
                <input type="password" name="password" placeholder="密码" autocomplete="current-password" required>
                <button type="submit">进入控制台</button>
            </form>
        </section>
    </div>

    <div id="login-root"></div>
    <script type="module" src="/static/login-app/login.js"></script>
</body>
</html>
