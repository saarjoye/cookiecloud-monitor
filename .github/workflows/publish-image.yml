name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GHCR_IMAGE_NAME: ghcr.io/saarjoye/cookiecloud-monitor

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"

          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE_NAME}:latest"
            echo "${GHCR_IMAGE_NAME}:sha-${short_sha}"
            if [[ -n "${{ vars.DOCKERHUB_USERNAME }}" ]]; then
              echo "docker.io/${{ vars.DOCKERHUB_USERNAME }}/cookiecloud-monitor:latest"
              echo "docker.io/${{ vars.DOCKERHUB_USERNAME }}/cookiecloud-monitor:sha-${short_sha}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=cookiecloud-monitor"
            echo "org.opencontainers.image.description=Proxy-based CookieCloud sync monitor with daily stats and web dashboard"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: ${{ steps.prep.outputs.labels }}
